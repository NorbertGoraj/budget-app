services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: budget
      POSTGRES_PASSWORD: budget
      POSTGRES_DB: budget
    ports:
      - "54329:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U budget"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrator:
    build: ./backend
    command: ["/migrate", "up"]
    environment:
      DATABASE_URL: postgres://budget:budget@db:5432/budget?sslmode=disable
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  backend:
    build: ./backend
    ports:
      - "8081:8080"
      - "9091:9091"
    environment:
      DATABASE_URL: postgres://budget:budget@db:5432/budget?sslmode=disable
    depends_on:
      migrator:
        condition: service_completed_successfully

  frontend:
    build: ./frontend
    ports:
      - "4201:80"
    depends_on:
      - backend

volumes:
  pgdata:
